<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地 AI 客服</title>
  <link rel="stylesheet" href="/static/chat-v2.css?v=20260508-models-1" />
</head>
<body>
  <div class="chat-page">
    <div class="chat-shell">
      <header class="chat-topbar">
        <div>
          <h1>本地 AI 客服</h1>
          <p>连接你本地知识库的简易聊天页</p>
        </div>

        <div class="topbar-right">
          <label class="debug-switch">
            <input type="checkbox" id="debug-toggle" />
            <span>显示调试信息</span>
          </label>
          <a href="/admin" class="admin-link">进入后台</a>
        </div>
      </header>

      <section class="test-panel">
        <div class="test-panel-header">
          <div>
            <div class="panel-title">测试客户</div>
            <div id="memory-status" class="panel-subtitle">未填写客户 ID，不会写入长期记忆。</div>
          </div>
          <div class="test-panel-actions">
            <span class="compact-badge">纠错学习：测试页启用</span>
            <button id="refresh-memory-btn" type="button" class="mini-btn">刷新记忆</button>
          </div>
        </div>

        <div class="test-fields">
          <label class="test-field">
            <span>渠道</span>
            <select id="channel-input">
              <option value="api">API</option>
              <option value="wechat">微信</option>
              <option value="feishu">飞书</option>
            </select>
          </label>
          <label class="test-field">
            <span>客户 ID</span>
            <input id="user-id-input" type="text" placeholder="例如：test_customer_001" />
          </label>
          <label class="test-field">
            <span>会话 ID</span>
            <input id="conversation-id-input" type="text" placeholder="例如：demo_session_001" />
          </label>
        </div>

        <div class="model-test-panel">
          <div class="model-test-head">
            <div>
              <div class="detail-title">模型测试</div>
              <div id="model-status" class="panel-subtitle">正在读取当前模型...</div>
            </div>
            <button id="refresh-models-btn" type="button" class="mini-btn">刷新模型</button>
          </div>
          <div class="model-test-grid">
            <label class="test-field">
              <span>测试模式</span>
              <select id="model-test-mode">
                <option value="single">单模型</option>
                <option value="compare">双模型对比</option>
              </select>
            </label>
            <label class="test-field">
              <span>模型 A</span>
              <select id="model-a-input"></select>
            </label>
            <label class="test-field compare-only hidden">
              <span>模型 B</span>
              <select id="model-b-input"></select>
            </label>
          </div>
        </div>

        <div id="test-debug-details" class="test-debug-details hidden">
          <div class="detail-block">
            <div class="detail-title">客户画像</div>
            <div id="memory-summary" class="memory-summary empty">当前没有加载客户画像。</div>
          </div>

          <div class="learning-panel">
            <div class="learning-item">
              <span>学习库</span>
              <strong id="learned-count">加载中</strong>
            </div>
            <div class="learning-item learning-wide">
              <span>主动调试</span>
              <strong id="gap-status">发送问题后显示系统需要什么资料和追问</strong>
            </div>
            <a class="mini-btn learning-link" href="/admin#learned-knowledge">查看学习库</a>
          </div>
        </div>
      </section>

      <main id="chat-box" class="chat-body">
        <div class="msg msg-ai">
          <div class="msg-avatar">AI</div>
          <div class="msg-bubble">
            <div class="msg-text">
              你好，我是本地 AI 客服助手。你可以直接问我产品、保修、售后等问题。
            </div>
          </div>
        </div>
      </main>

      <footer class="chat-composer">
        <div class="composer-left">
          <textarea
            id="question-input"
            class="composer-input"
            placeholder="请输入你的问题，例如：电池保修多久？"
            rows="3"
          ></textarea>
          <div class="composer-tip">快捷发送：Ctrl + Enter（Mac 可用 Command + Enter）</div>
        </div>

        <div class="composer-right">
          <button id="send-btn" class="btn btn-primary">发送</button>
          <button id="clear-btn" class="btn btn-secondary">清空</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="/static/chat-v2.js?v=20260508-models-1"></script>
</body>
</html>
